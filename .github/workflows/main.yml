name Habit Tracker Bot

on
  schedule
    - cron '0 7   '  # каждый день в 900 по Германии (UTC+2)
  workflow_dispatch

jobs
  run
    runs-on ubuntu-latest

    steps
      - name Загружаем код
        uses actionscheckout@v4

      - name Устанавливаем jq
        run 
          sudo apt-get update
          sudo apt-get install -y jq

      - name Читаем конфигурацию
        id config
        run 
          echo Считываем привычки...
          HABITS=$(jq -r '.habits[]' config.json  sed 's^• ')
          
          echo habitsEOF  $GITHUB_OUTPUT
          echo $HABITS  $GITHUB_OUTPUT
          echo EOF  $GITHUB_OUTPUT

      - name Генерируем сообщение
        id message
        run 
          MESSAGE=📅 Сегодняшние привычкиn${{ steps.config.outputs.habits }}nnНе забудь выполнить их 💪
          
          echo textEOF  $GITHUB_OUTPUT
          echo -e $MESSAGE  $GITHUB_OUTPUT
          echo EOF  $GITHUB_OUTPUT

      - name Отправляем в Telegram
        run 
          curl -s -X POST httpsapi.telegram.orgbot${{ secrets.TELEGRAM_BOT_TOKEN }}sendMessage 
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} 
            -d text=${{ steps.message.outputs.text }}

      - name Сохраняем историю
        run 
          echo $(date) Напоминание отправлено  history.log
          git config user.email github-actions@github.com
          git config user.name GitHub Actions
          git add history.log
          git commit -m Обновление истории $(date)  echo Нет изменений
          git push  echo Нечего пушить